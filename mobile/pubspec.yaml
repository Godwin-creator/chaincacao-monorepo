name: chaincacao_mobile
description: "Application mobile ChainCacao - Traçabilité Blockchain des Filières Café-Cacao au Togo."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Backend & Auth
  supabase_flutter: ^2.5.0

  # Blockchain
  web3dart: ^2.7.3
  walletconnect_flutter_v2: ^3.0.0
  http: ^1.2.2

  # Database & Storage
  sqflite: ^2.3.3+2
  path_provider: ^2.1.4
  path: ^1.9.0

  # GPS & Mapping
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # QR Code
  mobile_scanner: ^5.2.2
  qr_flutter: ^4.1.0

  # Device & UI
  connectivity_plus: ^6.0.5
  permission_handler: ^11.3.1
  lucide_icons: ^0.320.0
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  intl: ^0.19.0
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - ../shared/assets/
